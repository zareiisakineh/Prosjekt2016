<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test deg selv – KI-veileder for studenter</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></noscript>
  <style>
    .quiz-intro { text-align: center; padding: 1rem 0 0.5rem; }
    .quiz-intro h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .quiz-intro .intro-meta {
      display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;
      margin: 1.5rem 0; color: var(--text-secondary, #555);
    }
    .intro-meta-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.95rem; }
    .intro-meta-item i { color: var(--primary-color, #4a6fa5); font-size: 1.1rem; }
    .quiz-intro .intro-desc {
      max-width: 520px; margin: 0 auto 1.5rem; line-height: 1.6;
      color: var(--text-secondary, #444);
    }
    .btn-start {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.85rem 2.2rem; font-size: 1.05rem; font-weight: 600;
      background: var(--primary-color, #4a6fa5); color: #fff;
      border: none; border-radius: 30px; cursor: pointer;
      transition: background 0.2s, transform 0.1s; font-family: inherit;
    }
    .btn-start:hover { background: var(--primary-dark, #3a5f95); transform: translateY(-1px); }
    .quiz-progress-wrap { margin-bottom: 1.2rem; }
    .quiz-progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.85rem; color: var(--text-secondary, #666); margin-bottom: 4px;
    }
    .quiz-progress-bar {
      height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%; background: var(--primary-color, #4a6fa5);
      border-radius: 4px; transition: width 0.4s ease;
    }
    .quiz-question-area { min-height: 260px; }
    .quiz-question-area h3 {
      font-size: 0.85rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--primary-color, #4a6fa5); margin-bottom: 0.4rem;
    }
    .quiz-question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.2rem; line-height: 1.45; }
    .quiz-options { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }
    .quiz-option {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.85rem 1rem; border: 2px solid #e0e0e0; border-radius: 10px;
      cursor: pointer; transition: all 0.2s; background: #fff; font-size: 0.97rem;
      font-family: inherit; text-align: left; width: 100%;
    }
    .quiz-option .opt-icon {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid #ccc;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 0.8rem; color: #aaa; transition: all 0.2s;
    }
    .quiz-option:hover:not(:disabled) { border-color: var(--primary-color, #4a6fa5); background: #f0f5ff; }
    .quiz-option:hover:not(:disabled) .opt-icon { border-color: var(--primary-color, #4a6fa5); color: var(--primary-color, #4a6fa5); }
    .quiz-option.selected { border-color: var(--primary-color, #4a6fa5); background: #eef3fb; }
    .quiz-option.correct { border-color: #28a745; background: #d4edda; }
    .quiz-option.correct .opt-icon { border-color: #28a745; background: #28a745; color: #fff; }
    .quiz-option.incorrect { border-color: #dc3545; background: #f8d7da; }
    .quiz-option.incorrect .opt-icon { border-color: #dc3545; background: #dc3545; color: #fff; }
    .quiz-option:disabled { cursor: default; }
    .quiz-feedback {
      padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.93rem;
      display: none; margin-bottom: 0.5rem; line-height: 1.5;
    }
    .quiz-feedback.correct { background: #d4edda; color: #155724; display: flex; gap: 0.5rem; align-items: flex-start; }
    .quiz-feedback.incorrect { background: #f8d7da; color: #721c24; display: flex; gap: 0.5rem; align-items: flex-start; }
    .quiz-navigation {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 1.4rem; gap: 0.8rem;
    }
    .btn-nav {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.7rem 1.4rem; border-radius: 8px; font-size: 0.97rem;
      font-weight: 600; font-family: inherit; cursor: pointer;
      border: 2px solid var(--primary-color, #4a6fa5); transition: all 0.2s;
    }
    .btn-nav-secondary { background: #fff; color: var(--primary-color, #4a6fa5); }
    .btn-nav-secondary:hover:not(:disabled) { background: var(--primary-color, #4a6fa5); color: #fff; }
    .btn-nav-primary { background: var(--primary-color, #4a6fa5); color: #fff; }
    .btn-nav-primary:hover:not(:disabled) { background: var(--primary-dark, #3a5f95); }
    .btn-nav:disabled { opacity: 0.35; cursor: default; }
    .btn-reset {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.6rem 1.2rem; border-radius: 8px; font-size: 0.9rem;
      font-family: inherit; cursor: pointer; border: 2px solid #ccc;
      background: #fff; color: #555; transition: all 0.2s; font-weight: 500;
    }
    .btn-reset:hover { border-color: #999; color: #333; background: #f5f5f5; }
    .quiz-result { display: none; text-align: center; padding: 0.5rem 0; }
    .result-score-circle {
      width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 1.2rem;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; border: 6px solid;
    }
    .result-score-circle span { font-size: 0.75rem; font-weight: 500; margin-top: -4px; }
    .result-level-badge {
      display: inline-block; padding: 0.3rem 1rem; border-radius: 20px;
      font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem;
    }
    .result-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.5rem; }
    .result-desc { color: var(--text-secondary, #555); max-width: 480px; margin: 0 auto 1.4rem; line-height: 1.6; }
    .result-tips {
      background: #f7f9fc; border-radius: 10px; padding: 1rem 1.2rem;
      text-align: left; margin-bottom: 1.4rem;
    }
    .result-tips h4 { margin: 0 0 0.6rem; font-size: 0.95rem; }
    .result-tips ul { margin: 0; padding-left: 1.2rem; }
    .result-tips li { font-size: 0.92rem; color: #444; margin-bottom: 0.3rem; }
    .result-actions { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
    .btn-result-primary {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.75rem 1.6rem; border-radius: 8px; font-size: 0.97rem; font-weight: 600;
      font-family: inherit; cursor: pointer; border: none;
      background: var(--primary-color, #4a6fa5); color: #fff; transition: all 0.2s;
    }
    .btn-result-primary:hover { background: var(--primary-dark, #3a5f95); }
    .btn-result-secondary {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.75rem 1.6rem; border-radius: 8px; font-size: 0.97rem; font-weight: 600;
      font-family: inherit; cursor: pointer;
      border: 2px solid var(--primary-color, #4a6fa5);
      background: #fff; color: var(--primary-color, #4a6fa5); transition: all 0.2s;
    }
    .btn-result-secondary:hover { background: var(--primary-color, #4a6fa5); color: #fff; }
    .level-low  { color: #dc3545; border-color: #dc3545; }
    .level-low .result-level-badge { background: #f8d7da; color: #721c24; }
    .level-mid  { color: #fd7e14; border-color: #fd7e14; }
    .level-mid .result-level-badge { background: #ffe5cc; color: #7d3800; }
    .level-good { color: #28a745; border-color: #28a745; }
    .level-good .result-level-badge { background: #d4edda; color: #155724; }
    .level-high { color: #4a6fa5; border-color: #4a6fa5; }
    .level-high .result-level-badge { background: #dbe8fb; color: #1a3d6e; }
  </style>

  <script>
    const defaultQuizQuestions = [
      {
        q: "Når bør du oppgi at du har brukt KI i en oppgave?",
        options: [
          { text: "Alltid når KI har bidratt til arbeidet ditt.", correct: true },
          { text: "Bare når du bruker KI til å skrive hele teksten.", correct: false },
          { text: "Aldri – det er ikke nødvendig å oppgi dette.", correct: false }
        ],
        feedback: {
          correct: "Riktig! Du skal alltid oppgi KI-bruk, uansett om det gjelder idéutvikling, teksthjelp eller kildesøk.",
          incorrect: "Feil. Hovedregelen er at du alltid skal opplyse om KI-bruk når det har bidratt til arbeidet ditt."
        }
      },
      {
        q: "Hva gjør du hvis du er usikker på hva som er tillatt KI-bruk i et emne?",
        options: [
          { text: "Bruker KI uansett – det er sikkert greit.", correct: false },
          { text: "Spør foreleser eller sjekk emnebeskrivelsen.", correct: true },
          { text: "Unngår all KI-bruk for sikkerhets skyld.", correct: false }
        ],
        feedback: {
          correct: "Riktig! Ved tvil bør du alltid avklare med emneansvarlig. Reglene kan variere fra emne til emne.",
          incorrect: "Feil. Det sikreste er å spørre foreleser eller lese emnebeskrivelsen nøye."
        }
      },
      {
        q: "Hvorfor er det viktig å alltid dobbeltsjekke informasjon du får fra KI?",
        options: [
          { text: "Fordi lærere alltid krever det.", correct: false },
          { text: "Det er egentlig ikke nødvendig.", correct: false },
          { text: "KI kan \"hallusinere\" – generere informasjon som høres riktig ut, men er feil.", correct: true }
        ],
        feedback: {
          correct: "Riktig! KI-modeller kan produsere overbevisende, men faktisk feil informasjon – alltid verifiser med pålitelige kilder.",
          incorrect: "Feil. KI kan \"hallusinere\" og presentere feil fakta med høy selvsikkerhet. Verifiser alltid."
        }
      },
      {
        q: "Hvilke opplysninger bør du aldri dele med en KI-tjeneste?",
        options: [
          { text: "Generell faglig informasjon om emnet du studerer.", correct: false },
          { text: "Sensitiv eller personlig informasjon om deg selv eller andre.", correct: true },
          { text: "Kilder du har brukt i oppgaven.", correct: false }
        ],
        feedback: {
          correct: "Riktig! Persondata, sensitive opplysninger og konfidensiell informasjon skal aldri deles med KI-verktøy.",
          incorrect: "Feil. Personlig og sensitiv informasjon skal aldri legges inn i KI-tjenester på grunn av personvernhensyn."
        }
      },
      {
        q: "Hva er den beste måten å bruke KI på i studiene?",
        options: [
          { text: "Som støtte til egen læring og tenkning – ikke som erstatning for egeninnsats.", correct: true },
          { text: "La KI gjøre hele jobben, og lever inn resultatet.", correct: false },
          { text: "Kun til å søke opp kildehenvisninger.", correct: false }
        ],
        feedback: {
          correct: "Riktig! KI er et hjelpeverktøy. Du lærer mest når du selv tenker, og KI hjelper deg videre.",
          incorrect: "Feil. Å la KI gjøre hele jobben er i strid med akademisk integritet og hindrer din egen læring."
        }
      },
      {
        q: "Hva er en etisk utfordring ved bruk av KI i utdanning?",
        options: [
          { text: "KI er for dyrt til at det er relevant for studenter.", correct: false },
          { text: "KI er for komplisert å lære seg.", correct: false },
          { text: "KI-modeller kan inneholde skjevheter, og ikke alle studenter har lik tilgang til verktøyene.", correct: true }
        ],
        feedback: {
          correct: "Riktig! Skjevheter i treningsdata og ulik tilgang er reelle etiske utfordringer som påvirker rettferdighet i utdanning.",
          incorrect: "Feil. Tilgang og algoritmiske skjevheter er viktige etiske problemstillinger knyttet til KI i utdanning."
        }
      },
      {
        q: "Hva betyr begrepet 'prompt engineering'?",
        options: [
          { text: "En type maskinlæringsalgoritme.", correct: false },
          { text: "Teknikken for å formulere presise og effektive spørsmål for å få best mulig svar fra KI.", correct: true },
          { text: "En måte å programmere KI-modeller på.", correct: false }
        ],
        feedback: {
          correct: "Riktig! Gode prompts gir bedre og mer nyttige svar fra KI-verktøy.",
          incorrect: "Feil. Prompt engineering handler om å formulere gode spørsmål og instruksjoner til KI for å få presise svar."
        }
      },
      {
        q: "Hva er akademisk uredelighet i sammenheng med KI?",
        options: [
          { text: "Å bruke KI til å få idéer til oppgavestruktur.", correct: false },
          { text: "Å la KI foreslå bedre formuleringer mens du beholder egne argumenter.", correct: false },
          { text: "Å levere inn KI-generert tekst som sitt eget arbeid uten å oppgi det.", correct: true }
        ],
        feedback: {
          correct: "Riktig! Å presentere KI-tekst som sitt eget uten å opplyse om det regnes som juks på linje med plagiat.",
          incorrect: "Feil. Å levere inn KI-generert arbeid uten å oppgi det er det klassiske eksempelet på uredelighet."
        }
      },
      {
        q: "Hvem er ansvarlig for innholdet du leverer inn, selv om KI hjalp deg?",
        options: [
          { text: "Du selv – studenten er alltid ansvarlig for eget innlevert arbeid.", correct: true },
          { text: "KI-tjenesten du brukte.", correct: false },
          { text: "Universitetet, siden de tillater KI-bruk.", correct: false }
        ],
        feedback: {
          correct: "Riktig! KI er et verktøy. Faglig og etisk ansvar ligger alltid hos deg som student.",
          incorrect: "Feil. Ansvaret for innlevert arbeid ligger alltid hos deg, uavhengig av hvilke hjelpemidler du har brukt."
        }
      },
      {
        q: "Hvilken påstand om KI og opphavsrett er riktig?",
        options: [
          { text: "KI-generert tekst er alltid fri å bruke uten begrensninger.", correct: false },
          { text: "KI-generert tekst kan ha uklar opphavsrettsstatus – vær forsiktig med å bruke den uten å bearbeide den.", correct: true },
          { text: "Du eier automatisk opphavsretten til alt KI lager for deg.", correct: false }
        ],
        feedback: {
          correct: "Riktig! Opphavsrett rundt KI-generert innhold er juridisk uavklart i mange land. Bearbeid og vær transparent.",
          incorrect: "Feil. Opphavsrettslige spørsmål knyttet til KI-innhold er komplekse og ikke endelig avklart."
        }
      }
    ];

    let questions = defaultQuizQuestions;
    function loadQuizQuestions() {
      const translated = i18next?.t('quiz_questions', { returnObjects: true });
      const list = Array.isArray(translated) && translated.length ? translated : defaultQuizQuestions;
      return list.map(q => {
        if (Array.isArray(q.options) && q.options.length && typeof q.options[0] === 'string' && typeof q.correctIndex === 'number') {
          return {
            ...q,
            options: q.options.map((text, i) => ({ text, correct: i === q.correctIndex })),
          };
        }
        return q;
      });
    }

    let current = 0;
    let answers = new Array(questions.length).fill(null);
    let answered = new Array(questions.length).fill(false);

    function startQuiz() {
      questions = loadQuizQuestions();
      answers = new Array(questions.length).fill(null);
      answered = new Array(questions.length).fill(false);
      document.getElementById('quizIntro').style.display = 'none';
      document.getElementById('quizContent').style.display = 'block';
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[current];
      const area = document.getElementById('questionArea');
      const labels = ['A', 'B', 'C'];

      area.innerHTML = `
        <h3>${i18next.t('quiz_progress_label', { current: current + 1, total: questions.length })}</h3>
        <p class="quiz-question-text">${q.q}</p>
        <div class="quiz-options" role="group" aria-label="${i18next.t('quiz_options_aria_label')}">
          ${q.options.map((opt, i) => `
            <button class="quiz-option${answered[current] ? (opt.correct ? ' correct' : (answers[current] === i ? ' incorrect' : '')) : (answers[current] === i ? ' selected' : '')}"
              onclick="selectOption(${i})"
              ${answered[current] ? 'disabled' : ''}
              aria-label="${labels[i]}: ${opt.text}${answered[current] ? (opt.correct ? ' — ' + i18next.t('quiz_option_correct_suffix') : (answers[current] === i ? ' — ' + i18next.t('quiz_option_incorrect_suffix') : '')) : ''}">
              <span class="opt-icon" aria-hidden="true">${answered[current] ? (opt.correct ? '<i class="fas fa-check"></i>' : (answers[current] === i ? '<i class="fas fa-times"></i>' : labels[i])) : labels[i]}</span>
              ${opt.text}
            </button>
          `).join('')}
        </div>
      `;

      const fb = document.getElementById('quizFeedback');
      if (answered[current]) {
        const wasCorrect = answers[current] !== null && q.options[answers[current]].correct;
        fb.className = 'quiz-feedback ' + (wasCorrect ? 'correct' : 'incorrect');
        fb.innerHTML = `<i class="fas fa-${wasCorrect ? 'check-circle' : 'times-circle'}" aria-hidden="true"></i> ${wasCorrect ? q.feedback.correct : q.feedback.incorrect}`;
        fb.style.display = 'flex';
      } else {
        fb.style.display = 'none';
        fb.className = 'quiz-feedback';
      }

      updateProgress();
      updateNavButtons();
    }

    function selectOption(optIndex) {
      if (answered[current]) return;
      answers[current] = optIndex;
      answered[current] = true;

      const q = questions[current];
      const isCorrect = q.options[optIndex].correct;
      const labels = ['A', 'B', 'C'];
      const opts = document.querySelectorAll('.quiz-option');

      opts.forEach((btn, i) => {
        btn.disabled = true;
        btn.querySelector('.opt-icon').innerHTML = q.options[i].correct
          ? '<i class="fas fa-check"></i>'
          : (i === optIndex ? '<i class="fas fa-times"></i>' : labels[i]);
        if (q.options[i].correct) btn.classList.add('correct');
        else if (i === optIndex) btn.classList.add('incorrect');
      });

      const fb = document.getElementById('quizFeedback');
      fb.innerHTML = `<i class="fas fa-${isCorrect ? 'check-circle' : 'times-circle'}" aria-hidden="true"></i> ${isCorrect ? q.feedback.correct : q.feedback.incorrect}`;
      fb.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'incorrect');
      fb.style.display = 'flex';

      updateProgress();
      updateNavButtons();
    }

    function updateProgress() {
      const score = answers.filter((a, i) => a !== null && questions[i].options[a].correct).length;
      const pct = Math.round(((current + 1) / questions.length) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressFill').parentElement.setAttribute('aria-valuenow', pct);
      document.getElementById('progressLabel').textContent = i18next.t('quiz_progress_label', { current: current + 1, total: questions.length });
      document.getElementById('progressScore').textContent = i18next.t('quiz_score_text', { score });
    }

    function updateNavButtons() {
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const resetBtn = document.getElementById('resetBtn');

      prevBtn.disabled = current === 0;
      prevBtn.innerHTML = `<i class="fas fa-chevron-left" aria-hidden="true"></i> ${i18next.t('quiz_14')}`;
      prevBtn.setAttribute('aria-label', i18next.t('quiz_14'));

      resetBtn.innerHTML = `<i class="fas fa-redo-alt" aria-hidden="true"></i> ${i18next.t('quiz_15')}`;
      resetBtn.setAttribute('aria-label', i18next.t('quiz_15'));

      const isLast = current === questions.length - 1;
      if (isLast) {
        const viewLabel = i18next.t('quiz_17');
        nextBtn.innerHTML = `${viewLabel} <i class="fas fa-flag-checkered" aria-hidden="true"></i>`;
        nextBtn.setAttribute('aria-label', viewLabel);
        nextBtn.disabled = !answered[current];
      } else {
        const nextLabel = i18next.t('quiz_16');
        nextBtn.innerHTML = `${nextLabel} <i class="fas fa-chevron-right" aria-hidden="true"></i>`;
        nextBtn.setAttribute('aria-label', nextLabel);
        nextBtn.disabled = !answered[current];
      }
    }

    function nextQuestion() {
      if (current < questions.length - 1) { current++; renderQuestion(); }
      else if (answered[current]) { showResult(); }
    }

    function prevQuestion() {
      if (current > 0) { current--; renderQuestion(); }
    }

    function confirmReset() {
      if (confirm(i18next.t('quiz_confirm_reset'))) { resetQuiz(); }
    }

    function resetQuiz() {
      current = 0;
      answers = new Array(questions.length).fill(null);
      answered = new Array(questions.length).fill(false);
      document.getElementById('quizResult').style.display = 'none';
      document.getElementById('quizContent').style.display = 'block';
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showResult() {
      const score = answers.filter((a, i) => a !== null && questions[i].options[a].correct).length;
      const total = questions.length;
      const pct = Math.round((score / total) * 100);
      const passed = pct >= 70;

      const level = pct <= 40 ? 'low' : pct <= 60 ? 'mid' : pct <= 80 ? 'good' : 'high';
      const colorClass = `level-${level}`;
      const badge = i18next.t(`quiz_result_badge_${level}`);
      const title = i18next.t(`quiz_result_title_${level}`, { score, total, pct });
      const desc = i18next.t(`quiz_result_desc_${level}`, { score, total, pct });
      const tips = i18next.t(`quiz_result_tips_${level}`, { returnObjects: true });

      document.getElementById('quizContent').style.display = 'none';
      const resultEl = document.getElementById('quizResult');
      resultEl.className = `quiz-result ${colorClass}`;
      resultEl.innerHTML = `
        <div class="result-score-circle" aria-label="${i18next.t('quiz_result_score_aria', { score, total, pct })}">${score}/${total}<span>${pct}%</span></div>
        <div class="result-level-badge">${badge}</div>
        <h2 class="result-title">${title}</h2>
        <p class="result-desc">${desc}</p>
        <div class="result-tips">
          <h3 style="font-size:0.95rem; margin:0 0 0.6rem;"><i class="fas fa-lightbulb" aria-hidden="true"></i> ${i18next.t('quiz_result_next_steps_heading')}</h3>
          <ul>${tips.map(t => `<li>${t}</li>`).join('')}</ul>
        </div>
        <div class="result-actions">
          <button class="btn-result-primary" onclick="resetQuiz()" aria-label="${i18next.t('quiz_result_button_reset')}"><i class="fas fa-redo-alt" aria-hidden="true"></i> ${i18next.t('quiz_result_button_reset')}</button>
          <a href="tips.html" class="btn-result-secondary" aria-label="${i18next.t('quiz_result_button_link')}"><i class="fas fa-lightbulb" aria-hidden="true"></i> ${i18next.t('quiz_result_button_link')}</a>
        </div>
      `;
      resultEl.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/i18next@22.4.10/i18next.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2.2.1/i18nextHttpBackend.min.js"></script>
  <script src="app.js?v=2" defer></script>
</body>
</html>
