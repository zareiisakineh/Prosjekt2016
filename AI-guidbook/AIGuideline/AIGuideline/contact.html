<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kontakt – AIGuideline</title>
  <link rel="stylesheet" href="style.css" />
<header class="topbar">
  <div class="brand">AIGuideline</div>
  <nav class="nav">
    <a href="index.html">Hjem</a>
    <a href="quiz.html">Quiz</a>
    <a href="contact.html">Kontakt</a>
  </nav>
</header>

  <main class="container">
<h2>Kontakt & feedback</h2>
<p class="small">Send oss en melding eller gi rask feedback. (Database kobles på senere.)</p>

<section class="card">
  <h3>Kontaktskjema</h3>
  <form id="contactForm">
    <label for="name">Navn (valgfritt)</label>
    <input id="name" name="name" type="text" />

    <label for="email">E-post (valgfritt)</label>
    <input id="email" name="email" type="email" />

    <label for="topic">Tema</label>
    <select id="topic" name="topic">
      <option>Spørsmål</option>
      <option>Forslag</option>
      <option>Feil på siden</option>
    </select>

    <label for="message">Melding *</label>
    <textarea id="message" name="message" rows="5" required></textarea>

    <button type="submit">Send</button>
    <p id="contactStatus" class="small"></p>
  </form>
</section>

<section class="card">
  <h3>Rask feedback</h3>
  <form id="feedbackForm">
    <label for="rating">Vurdering (1–5)</label>
    <select id="rating" name="rating">
      <option value="5">5 – Veldig bra</option>
      <option value="4">4 – Bra</option>
      <option value="3">3 – OK</option>
      <option value="2">2 – Dårlig</option>
      <option value="1">1 – Veldig dårlig</option>
    </select>

    <label for="comment">Kommentar *</label>
    <textarea id="comment" name="comment" rows="4" required></textarea>

    <button type="submit">Send feedback</button>
    <p id="feedbackStatus" class="small"></p>
  </form>
</section>

<script src="app.js"></script>
  </main>
</body>
</html>
