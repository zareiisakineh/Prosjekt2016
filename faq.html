  <script>
    function toggleFaq(button) {
      const faqItem = button.parentElement;
      const answer = faqItem.querySelector('.faq-answer');
      const icon = button.querySelector('.faq-icon');
      const isOpen = answer.classList.contains('active');
      document.querySelectorAll('.faq-answer').forEach(item => item.classList.remove('active'));
      document.querySelectorAll('.faq-icon').forEach(item => item.classList.remove('open'));
      document.querySelectorAll('.faq-question').forEach(btn => btn.setAttribute('aria-expanded', 'false'));
      if (!isOpen) {
        answer.classList.add('active');
        icon.classList.add('open');
        button.setAttribute('aria-expanded', 'true');
      }
    }
  </script>
