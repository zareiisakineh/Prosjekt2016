<!doctype html>
<html lang="no">
<head>

  <link rel="stylesheet" href="style.css" />

        <li><a href="links.html" class="nav-link"><i class="fas fa-link" aria-hidden="true"></i> <span data-i18n="useful_links"></span></a></li>
        <li><a href="contact.html" class="nav-link"><i class="fas fa-envelope" aria-hidden="true"></i> <span data-i18n="contact"></span></a></li>
      </ul>
      <button class="menu-toggle" aria-label="Åpne navigasjonsmeny" aria-expanded="false" aria-controls="sideMenu" id="menuToggle">

        <span class="hamburger-bar" aria-hidden="true"></span>
        <span class="hamburger-bar" aria-hidden="true"></span>
      </button>
    </nav>
    <div class="language-selector">
      <button onclick="changeLanguage('no')" aria-label="Norsk" class="lang-btn lang-no" title="Norsk">NO</button>
      <button onclick="changeLanguage('en')" aria-label="English" class="lang-btn lang-en" title="English">EN</button>
    </div>
  </header>

  <aside class="side-menu" id="sideMenu" aria-hidden="true" aria-label="Mobilnavigasjon">
    <div class="side-menu-header">
      <span class="side-menu-title" data-i18n="menu"></span>
      <button class="side-menu-close" id="menuClose" aria-label="Lukk navigasjonsmeny">✕</button>

    <nav aria-label="Mobilmeny">

        <li><a href="index.html" class="active" aria-current="page"><i class="fas fa-home" aria-hidden="true"></i> <span data-i18n="home"></span></a></li>

      <p class="lead" data-i18n="hero_lead"></p>
      <div class="why-matters" role="note" aria-label="Viktig informasjon">

        <p data-i18n="why_matters_text"></p>
      </div>
      <p class="small" data-i18n="disclaimer"></p>
    </section>

    <section class="card" aria-labelledby="kom-i-gang-heading">
      <h2 id="kom-i-gang-heading" data-i18n="get_started"></h2>
      <p class="lead" data-i18n="get_started_lead"></p>
      <div class="grid">
        <a href="faq.html" class="tile">
          <h3><i class="fas fa-question-circle" aria-hidden="true"></i> <span data-i18n="step_1"></span></h3>
          <p data-i18n="step_1_text"></p>

          <p data-i18n="step_3_text"></p>
        </a>
      </div>
    </section>

      <h2 id="sok-heading" data-i18n="search_heading"></h2>
      <p class="lead" data-i18n="search_lead"></p>
      <div class="search-bar">
        <label for="globalSearch" class="visually-hidden" data-i18n="search_label"></label>
        <input
          type="search"
          id="globalSearch"
          placeholder=""
          autocomplete="off"
          aria-describedby="searchHint"
          data-i18n="[placeholder]search_placeholder"
        />
        <span id="searchHint" class="visually-hidden" data-i18n="search_hint"></span>
      </div>
      <ul id="searchResults" class="search-results" aria-live="polite" aria-label="Søkeresultater"></ul>
    </section>

    <section class="card" aria-labelledby="utforsk-heading">
      <h2 id="utforsk-heading" data-i18n="explore_heading"></h2>
      <nav aria-label="Snarveier">
        <div class="link-row">
          <a href="faq.html" class="link-pill"><i class="fas fa-question-circle" aria-hidden="true"></i> <span data-i18n="faq"></span></a>
          <a href="tips.html" class="link-pill"><i class="fas fa-lightbulb" aria-hidden="true"></i> <span data-i18n="ai_questions"></span></a>
